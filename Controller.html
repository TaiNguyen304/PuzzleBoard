<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --pink: #ff00cc;
            --neon: #39ff14;
        }

        * {
            font-weight: bold !important;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: #fff;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .panel {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            border-top: 4px solid var(--pink);
            margin-bottom: 15px;
        }

        h3 {
            margin-top: 0;
            color: var(--pink);
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        .excel-upload-wrapper {
            background: #333;
            border: 2px dashed var(--neon);
            padding: 25px;
            text-align: center;
            border-radius: 8px;
            transition: 0.3s;
            position: relative;
        }

        .excel-upload-wrapper:hover {
            background: #3d3d3d;
            border-color: #fff;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 25px;
            cursor: pointer;
            background: var(--neon);
            color: #000;
            border-radius: 5px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        #file-name-display {
            display: block;
            margin-top: 10px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        button {
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            transition: 0.2s;
            background: #39ff14;
            color: black;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background: orange !important;
            color: white !important;
            transform: scale(1.02);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-round {
            background: #39ff14;
            color: black;
        }

        .btn-reveal-all {
            background: aqua;
            color: black;
            width: 100%;
            margin-top: 10px;
            border: 1px solid #00d9ff;
        }

        .btn-reset {
            background: red;
            color: white;
            width: 100%;
            margin-top: 10px;
            border: 1px solid #f00;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
        }

        .modal-content {
            background: #222;
            margin: 10% auto;
            padding: 30px;
            width: 550px;
            border-radius: 15px;
            border: 3px solid var(--pink);
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 204, 0.5);
        }

        .category-option {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            background: #111;
            color: var(--neon);
            border: 2px solid var(--neon);
            font-size: 1.1rem;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            margin-bottom: 15px;
            background: #000;
            padding: 10px;
            border-radius: 5px;
        }

        .key {
            padding: 12px 2px;
            font-size: 1.1rem;
            background: green;
            color: white;
        }

        .key.used {
            background: #111;
            color: #555 !important;
            opacity: 0.4;
            pointer-events: none;
            border: 1px solid #222;
        }

        .pos-control {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .pos-input-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
            min-height: 20px;
        }

        .pos-input-grid input {
            width: 45px;
            padding: 8px;
            text-align: center;
            background: #000;
            color: var(--neon);
            border: 1px solid var(--neon);
            border-radius: 4px;
        }

        .btn-action {
            background: var(--pink);
            color: #fff;
            padding: 12px;
            font-size: 0.85rem;
            flex: 1;
        }

        .quick-controls {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .btn-quick {
            background: purple;
            color: white;
            flex: 1;
            font-size: 0.7rem;
            padding: 8px 2px;
        }

        .st-val {
            color: var(--neon);
            font-size: 1.2rem;
            display: block;
            margin-top: 5px;
        }

        .btn-close-popup {
            background: #555;
            color: white;
            padding: 10px 30px;
            margin-top: 20px;
            border-radius: 5px;
        }
    </style>
</head>

    <script>
        var SUPABASE_URL = 'https://tfdgtdderkaergijhucb.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmZGd0ZGRlcmthZXJnaWpodWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjM5MzksImV4cCI6MjA5NDAzOTkzOX0._BOLe4xH5ZuhfXfsdS63eY9N12wyomq58GG0toi1aIE';
        var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const VIETNAMESE_ALPHABET = "AĂÂBCDĐEÊGHIKLMNOÔƠPQRSTUƯVXY".split('');
        let excelData = [];
        let currentRoundData = null;
        let selectedRoundName = "";
        let usedChars = [];
        let currentPuzzleRaw = "";
        let currentLayout = null;
        let quickInterval = null;
        let scores = { red: { total: 0, round: 0 }, yellow: { total: 0, round: 0 }, blue: { total: 0, round: 0 } };

        const BLOCK_STARTS_12 = [3, 18, 33];
        const BLOCK_STARTS_14 = [2, 17, 32];

        // Khởi tạo khi trang web load
        window.onload = async () => {
            await loadCurrentState();
            renderKeyboard();
        };

        // Hàm hỗ trợ dịch layout ma trận thành chuỗi ký tự có khoảng cách chính xác dựa trên các ô trống
        function getPuzzleStringWithSpaces(layout) {
            if (!layout || !Array.isArray(layout)) return "-";
            let words = [];
            layout.forEach(row => {
                let currentWord = "";
                row.forEach(char => {
                    if (char && char.trim() !== "") {
                        currentWord += char;
                    } else {
                        if (currentWord !== "") {
                            words.push(currentWord);
                            currentWord = "";
                        }
                    }
                });
                if (currentWord !== "") {
                    words.push(currentWord);
                }
            });
            return words.join(" ") || "-";
        }

        async function loadCurrentState() {
            const { data, error } = await db.from('wheel_game').select('*').eq('id', 1).maybeSingle();
            if (data) {
                // Khôi phục điểm số
                scores.red.total = data.score_red_total || 0;
                scores.red.round = data.score_red_round || 0;
                scores.yellow.total = data.score_yellow_total || 0;
                scores.yellow.round = data.score_yellow_round || 0;
                scores.blue.total = data.score_blue_total || 0;
                scores.blue.round = data.score_blue_round || 0;

                // Khôi phục ký tự đã dùng
                usedChars = data.revealed_chars ? data.revealed_chars.split(',') : [];
                currentPuzzleRaw = data.puzzle_text || "";

                if (data.board_layout) {
                    try { currentLayout = JSON.parse(data.board_layout); } catch (e) { currentLayout = null; }
                }

                // Khôi phục UI trạng thái (Sửa đổi hiển thị ô chữ có khoảng cách)
                document.getElementById('st-cat').innerText = data.category || "-";
                if (currentLayout) {
                    document.getElementById('st-puz').innerText = getPuzzleStringWithSpaces(currentLayout);
                } else {
                    document.getElementById('st-puz').innerText = currentPuzzleRaw || "-";
                }

                updateScoreUI();
                renderKeyboard();
            }
        }

        function getCell(row, idx) {
            return (row && row[idx] != null && String(row[idx]).trim() !== '') ? String(row[idx]).trim() : "";
        }

        function buildBoardLayout(rows, startRowIdx) {
            let bestBlock = 0;
            let maxFound = 0;
            for (let b = 0; b < 3; b++) {
                let count = 0;
                for (let r = 0; r < 4; r++) {
                    const rowData = rows[startRowIdx + r] || [];
                    const s14 = BLOCK_STARTS_14[b];
                    for (let c = 0; c < 14; c++) if (getCell(rowData, s14 + c)) count++;
                }
                if (count > maxFound) { maxFound = count; bestBlock = b; }
            }

            const s12 = BLOCK_STARTS_12[bestBlock];
            const s14 = BLOCK_STARTS_14[bestBlock];
            const layout = [];

            let r1 = new Array(14).fill("");
            for (let i = 0; i < 12; i++) r1[i + 1] = getCell(rows[startRowIdx], s12 + i);
            layout.push(r1);

            let r2 = new Array(14).fill("");
            for (let i = 0; i < 14; i++) r2[i] = getCell(rows[startRowIdx + 1], s14 + i);
            layout.push(r2);

            let r3 = new Array(14).fill("");
            for (let i = 0; i < 14; i++) r3[i] = getCell(rows[startRowIdx + 2], s14 + i);
            layout.push(r3);

            let r4 = new Array(14).fill("");
            for (let i = 0; i < 12; i++) r4[i + 1] = getCell(rows[startRowIdx + 3], s12 + i);
            layout.push(r4);

            return layout;
        }

        function isPuzzleRoundRow(a0) {
            if (!a0) return false;
            const s = String(a0).trim();
            return /Vòng|Đoán Nhanh|ĐNLH|Khởi động|Câu|ĐB/i.test(s);
        }

        // 1. Định nghĩa vị trí cột theo yêu cầu của bạn
        const COL_MAP = {
            P1: { cat: 1, cols12: [3, 14], cols14: [2, 15] },  // Chủ đề 1: Cột B, Cột D-O (12), Cột C-P (14)
            P2: { cat: 16, cols12: [18, 29], cols14: [17, 30] }, // Chủ đề 2: Cột Q, Cột S-AD (12), Cột R-AE (14)
            P3: { cat: 31, cols12: [33, 44], cols14: [32, 45] }  // Chủ đề 3: Cột AF, Cột AH-AS (12), Cột AG-AT (14)
        };

        // 2. Hàm xây dựng Layout từ 4 hàng cố định
        function buildLayoutFromBlock(block, config) {
            const layout = [];
            const { cols12, cols14 } = config;

            const getChars = (rowArr, start, end) => {
                if (!rowArr) return new Array(end - start + 1).fill("");
                return rowArr.slice(start, end + 1).map(c => (c != null && c !== '') ? String(c).trim() : "");
            };

            // Hàng 1 (Hàng 12 ô): Lấy dữ liệu và thêm 1 ô trống 2 đầu để đủ 14 cột
            layout.push(["", ...getChars(block[0], cols12[0], cols12[1]), ""]);
            // Hàng 2 (Hàng 14 ô)
            layout.push(getChars(block[1], cols14[0], cols14[1]));
            // Hàng 3 (Hàng 14 ô)
            layout.push(getChars(block[2], cols14[0], cols14[1]));
            // Hàng 4 (Hàng 12 ô)
            layout.push(["", ...getChars(block[3], cols12[0], cols12[1]), ""]);

            return layout;
        }

        // 3. Xử lý nạp file Excel theo quy tắc nhảy 4 hàng
        document.getElementById('excelFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-name-display').innerText = "📁 " + file.name;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });

                excelData = [];
                // Bắt đầu từ hàng 2 (index 1), mỗi bước nhảy 4 hàng
                for (let i = 1; i < rows.length; i += 4) {
                    const block = rows.slice(i, i + 4);
                    if (!block[0] || !block[0][0]) continue; // Bỏ qua hàng trống

                    const roundName = String(block[0][0]).trim();
                    const options = [];

                    // Kiểm tra và nạp 3 chủ đề nằm ngang
                    ["P1", "P2", "P3"].forEach(key => {
                        const config = COL_MAP[key];
                        const catName = block[0][config.cat];
                        if (catName) {
                            options.push({
                                cat: String(catName).trim(),
                                layout: buildLayoutFromBlock(block, config)
                            });
                        }
                    });

                    if (options.length > 0) {
                        excelData.push({ Vong: roundName, Options: options });
                    }
                }
                showPopup("Hệ Thống", `Đã nạp file Excel thành công!`);
            };
            reader.readAsArrayBuffer(file);
        });

        function handleRound(roundName, hasPopup) {
            selectedRoundName = roundName;
            currentRoundData = excelData.find(d => String(d.Vong).toLowerCase().includes(roundName.toLowerCase()));
            if (!currentRoundData) {
                showPopup("Thông báo", "Không tìm thấy dữ liệu cho vòng: " + roundName);
                return;
            }

            const isQuick = ["Đoán Nhanh", "ĐNLH"].some(t => roundName.includes(t));
            const rnLower = roundName.toLowerCase();
            const isSpecialRound = rnLower.includes('vòng đặc biệt') || rnLower.includes('vòng phụ') || roundName.includes('ĐB');

            document.getElementById('quick-panel').style.display = isQuick ? 'block' : 'none';
            document.getElementById('btn-nghia').style.display = isSpecialRound ? 'block' : 'none';
            // Vòng ĐB, câu hỏi phụ ĐB*, và Vòng phụ: NGHIA + đoán thêm + mở ô như nhau
            document.getElementById('special-guess-panel').style.display = isSpecialRound ? 'block' : 'none';

            if (!hasPopup) {
                sendToBoard(currentRoundData.Options[0].cat, currentRoundData.Options[0].layout);
            } else {
                const actions = `
            <button onclick="loadFixedPuzzle()" style="background: var(--pink);color: white; width: 100%; padding: 15px; margin-bottom: 10px;">Ô CHỮ CỐ ĐỊNH</button>
            <button onclick="showCategoryPicker()" style="background: red;color: white; width: 100%; padding: 15px;">CHỌN 1 TRONG 3 CHỦ ĐỀ</button>
        `;
                showPopup(roundName, "Lựa chọn chế độ:", actions);
            }
        }

        function loadFixedPuzzle() {
            sendToBoard(currentRoundData.Options[0].cat, currentRoundData.Options[0].layout);
            closePopup();
        }

        function showCategoryPicker() {
            let btns = ``;
            currentRoundData.Options.forEach((opt, idx) => {
                btns += `<button class="category-option" onclick="selectCategoryByIndex(${idx}); closePopup();">${opt.cat.toUpperCase()}</button>`;
            });
            showPopup(selectedRoundName, "Danh sách chủ đề:", btns);
        }

        function selectCategoryByIndex(idx) {
            const opt = currentRoundData.Options[idx];
            if (opt) sendToBoard(opt.cat, opt.layout);
        }

        async function sendToBoard(cat, layout) {
            currentLayout = layout;
            let rawText = "";
            layout.forEach(row => row.forEach(char => { if (char) rawText += char; }));
            currentPuzzleRaw = rawText;
            usedChars = [];

            const { error } = await db.from('wheel_game').update({
                puzzle_text: rawText,
                category: String(cat).toUpperCase(),
                revealed_chars: "",
                marked_positions: "",
                revealed_positions: "",
                board_layout: JSON.stringify(layout),
                is_full_reveal: false // Reset không hiện dấu
            }).eq('id', 1);

            if (!error) {
                document.getElementById('st-round').innerText = selectedRoundName;
                document.getElementById('st-cat').innerText = cat;
                // Cập nhật hiển thị trạng thái ô chữ có dấu cách trực quan
                document.getElementById('st-puz').innerText = getPuzzleStringWithSpaces(layout);
                renderKeyboard();
            }
        }

        function generatePosInputs() {
            const num = parseInt(document.getElementById('numPos').value);
            const container = document.getElementById('posContainer');
            container.innerHTML = '';
            if (isNaN(num) || num <= 0) return;
            for (let i = 0; i < num; i++) {
                const input = document.createElement('input');
                input.type = 'number';
                input.placeholder = '#' + (i + 1);
                input.className = 'pos-item';
                container.appendChild(input);
            }
        }


        function rcToPosition(r, c) {
            if (r === 0) {
                if (c < 1 || c > 12) return null;
                return c;
            }
            if (r === 1) {
                if (c < 0 || c > 13) return null;
                return 13 + c;
            }
            if (r === 2) {
                if (c < 0 || c > 13) return null;
                return 27 + c;
            }
            if (r === 3) {
                if (c < 1 || c > 12) return null;
                return 40 + c;
            }
            return null;
        }

        function positionToRC(pos) {
            if (pos < 1 || pos > 52) return null;
            if (pos <= 12) return { r: 0, c: pos };
            if (pos <= 26) return { r: 1, c: pos - 13 };
            if (pos <= 40) return { r: 2, c: pos - 27 };
            return { r: 3, c: pos - 40 };
        }

        async function processSequence(mode) {
            const inputs = document.querySelectorAll('.pos-item');
            let positions = Array.from(inputs)
                .map(inp => parseInt(inp.value, 10))
                .filter(v => !isNaN(v) && v >= 1 && v <= 52);
            positions = [...new Set(positions)];

            if (positions.length === 0 || !currentLayout) return;

            // Lấy trạng thái mới nhất từ cơ sở dữ liệu
            const { data: row } = await db.from('wheel_game').select('marked_positions, revealed_positions, revealed_chars').eq('id', 1).maybeSingle();

            let marked = (row && row.marked_positions) ? row.marked_positions.split(',').filter(Boolean).map(Number) : [];
            let revPos = (row && row.revealed_positions) ? row.revealed_positions.split(',').filter(Boolean).map(Number) : [];

            // LUẬT Ô MAY MẮN: Nếu là Lần 2, chỉ lọc giữ lại các ô THỰC SỰ đã được đánh dấu ở Lần 1
            if (mode === 2) {
                positions = positions.filter(pos => marked.includes(pos));
                if (positions.length === 0) return; // Nếu không có ô nào được đánh dấu trước đó thì dừng lại
            }

            for (let i = 0; i < positions.length; i++) {
                const pos = positions[i];

                if (mode === 1) {
                    // LẦN 1: CHỈ ĐÁNH DẤU CAM
                    if (!marked.includes(pos)) marked.push(pos);
                    await db.from('wheel_game').update({ marked_positions: marked.join(',') }).eq('id', 1);
                }
                else {
                    // LẦN 2: MỞ CHỮ LẦN LƯỢT TỪNG Ô (CHỈ Ô ĐƯỢC ĐÁNH DẤU)
                    const rc = positionToRC(pos);
                    const ch = currentLayout[rc.r][rc.c];
                    if (ch) {
                        if (!revPos.includes(pos)) revPos.push(pos);
                        marked = marked.filter(p => p !== pos);

                        await db.from('wheel_game').update({
                            marked_positions: marked.join(','),
                            revealed_positions: revPos.join(',')
                        }).eq('id', 1);
                    }
                }

                if (i < positions.length - 1) {
                    await new Promise(r => setTimeout(r, 1200));
                }
            }
        }

        async function quickStart() {
            usedChars = [];
            await db.from('wheel_game').update({ revealed_chars: "" }).eq('id', 1);
            quickResume();
        }

        function quickStop() { if (quickInterval) clearInterval(quickInterval); }

        function quickResume() {
            if (quickInterval) clearInterval(quickInterval);

            quickInterval = setInterval(async () => {
                // Lấy dữ liệu mới nhất từ DB để tránh ghi đè
                const { data } = await db.from('wheel_game').select('revealed_positions').eq('id', 1).single();
                let revPos = data.revealed_positions ? data.revealed_positions.split(',').map(Number) : [];

                // Tìm các vị trí có chữ nhưng chưa lật
                let availablePositions = [];
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 14; c++) {
                        let char = currentLayout[r][c];
                        if (char && char.trim() !== "") {
                            let pos = rcToPosition(r, c);
                            if (pos && !revPos.includes(pos)) {
                                availablePositions.push(pos);
                            }
                        }
                    }
                }

                if (availablePositions.length === 0) {
                    clearInterval(quickInterval);
                    return;
                }

                // Chọn ngẫu nhiên 1 vị trí duy nhất
                const randomPos = availablePositions[Math.floor(Math.random() * availablePositions.length)];
                revPos.push(randomPos);

                await db.from('wheel_game').update({
                    revealed_positions: revPos.join(',')
                }).eq('id', 1);

            }, 2000); // Khoảng cách 2 giây mỗi ô
        }

        function revealNghia() {
            if (!currentLayout) return;

            const targetChars = ['N', 'G', 'H', 'I', 'A'];
            let foundPositions = [];

            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 14; c++) {
                    let cellChar = currentLayout[r][c];
                    if (cellChar) {
                        // Kiểm tra trực tiếp để loại trừ Ă, Â trước khi chuẩn hóa
                        if (cellChar === 'Ă' || cellChar === 'Â') continue;

                        let norm = cellChar.normalize('NFD')
                            .replace(/[\u0300\u0301\u0303\u0309\u0323]/g, '')
                            .normalize('NFC')
                            .toUpperCase();

                        if (targetChars.includes(norm)) {
                            let pos = rcToPosition(r, c);
                            if (pos) foundPositions.push(pos);
                        }
                    }
                }
            }
            fillPositionsToController(foundPositions);
        }

        async function revealAll() {
            usedChars = [...VIETNAMESE_ALPHABET];
            await db.from('wheel_game').update({
                revealed_chars: usedChars.join(','),
                is_full_reveal: true // Bật trạng thái hiện dấu
            }).eq('id', 1);
            renderKeyboard();
        }

        async function resetBoard() {
            quickStop();
            await db.from('wheel_game').update({
                puzzle_text: "", category: "", revealed_chars: "",
                marked_positions: "", revealed_positions: "",
                board_layout: "[]", is_full_reveal: false
            }).eq('id', 1);
            usedChars = []; currentLayout = null; currentPuzzleRaw = "";
            document.getElementById('st-puz').innerText = "-";
            document.getElementById('st-cat').innerText = "-";
            renderKeyboard();
        }

        async function pressKey(char) {
            if (!usedChars.includes(char)) {
                let positions = [];
                
                // 1. LẤY DANH SÁCH CÁC Ô ĐÃ MỞ TỪ DATABASE
                const { data: row } = await db.from('wheel_game').select('revealed_positions').eq('id', 1).maybeSingle();
                let revPos = (row && row.revealed_positions) ? row.revealed_positions.split(',').filter(Boolean).map(Number) : [];

                if (currentLayout) {
                    for (let r = 0; r < 4; r++) {
                        for (let c = 0; c < 14; c++) {
                            let cellChar = currentLayout[r][c];
                            if (cellChar) {
                                // Khử dấu thanh để so sánh chữ cái
                                let norm = cellChar.normalize('NFD')
                                    .replace(/[\u0300\u0301\u0303\u0309\u0323]/g, '')
                                    .normalize('NFC')
                                    .toUpperCase();

                                if (norm === char) {
                                    let pos = rcToPosition(r, c);
                                    
                                    // 2. ĐIỀU KIỆN MỚI: Chỉ thêm vào nếu vị trí này CHƯA được mở
                                    if (pos && !revPos.includes(pos)) {
                                        positions.push(pos);
                                    }
                                }
                            }
                        }
                    }
                }

                // 3. HIỂN THỊ KẾT QUẢ ĐÃ LỌC LÊN GIAO DIỆN
                if (positions.length > 0) {
                    document.getElementById('numPos').value = positions.length;
                    generatePosInputs();
                    const inputs = document.querySelectorAll('.pos-item');
                    positions.forEach((p, idx) => {
                        if(inputs[idx]) inputs[idx].value = p;
                    });
                } else {
                    // Nếu không còn chữ nào chưa mở, xóa trắng mục nhập vị trí
                    document.getElementById('numPos').value = "";
                    generatePosInputs();
                }

                usedChars.push(char);
                renderKeyboard();
            }
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            VIETNAMESE_ALPHABET.forEach(char => {
                const btn = document.createElement('button');
                btn.innerText = char;
                btn.className = 'key' + (usedChars.includes(char) ? ' used' : '');
                btn.onclick = () => pressKey(char);
                kb.appendChild(btn);
            });
        }

        function showPopup(title, message, actionsHtml = "") {
            document.getElementById('modalTitle').innerText = title.toUpperCase();
            document.getElementById('modalBody').innerHTML = message;
            document.getElementById('modalActions').innerHTML = actionsHtml;
            document.getElementById('mainModal').style.display = 'block';
        }
        function closePopup() { document.getElementById('mainModal').style.display = 'none'; }

        async function changeBorderColor(color) { await db.from('wheel_game').update({ border_color: color }).eq('id', 1); }

        function formatInput(input) {
            let val = input.value.replace(/\D/g, "");
            input.value = val ? Number(val).toLocaleString('vi-VN') : "";
        }
        async function addScore(p, t) {
            const val = parseInt(document.getElementById(`input-${p}`).value.replace(/\./g, "")) || 0;
            scores[p][t] += val;
            document.getElementById(`input-${p}`).value = "";
            await syncScores();
        }
        async function subScore(p, t) {
            const val = parseInt(document.getElementById(`input-${p}`).value.replace(/\./g, "")) || 0;
            scores[p][t] -= val;
            document.getElementById(`input-${p}`).value = "";
            await syncScores();
        }
        async function resetScores(t) {
            scores.red[t] = 0; scores.yellow[t] = 0; scores.blue[t] = 0;
            await syncScores();
        }
        async function syncScores() {
            await db.from('wheel_game').update({
                score_red_total: scores.red.total, score_red_round: scores.red.round,
                score_yellow_total: scores.yellow.total, score_yellow_round: scores.yellow.round,
                score_blue_total: scores.blue.total, score_blue_round: scores.blue.round
            }).eq('id', 1);
            updateScoreUI();
        }
        function updateScoreUI() {
            ['red', 'yellow', 'blue'].forEach(p => {
                document.getElementById(`disp-${p}-total`).innerText = scores[p].total.toLocaleString('vi-VN');
                document.getElementById(`disp-${p}-round`).innerText = scores[p].round.toLocaleString('vi-VN');
            });
        }
        async function toggleDisplayScore(mode) {
            await db.from('wheel_game').update({ score_display_mode: mode }).eq('id', 1);
        }

        function processSpecialGuesses() {
            if (!currentLayout) return;

            const inputs = document.querySelectorAll('.guess-input');
            // Lấy giá trị đã nhập, khử dấu thanh, giữ mặt chữ (U, Ư...)
            const guessedChars = Array.from(inputs)
                .map(i => i.value.trim())
                .filter(v => v !== "")
                .map(v => removeVietnameseTones(v));

            if (guessedChars.length === 0) {
                showPopup("Thông báo", "Vui lòng nhập ít nhất 1 chữ cái.");
                return;
            }

            let foundPositions = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 14; c++) {
                    let cellChar = currentLayout[r][c];
                    if (cellChar) {
                        // Khử dấu thanh của ô chữ trên bảng để so sánh
                        let normCell = removeVietnameseTones(cellChar);

                        // Kiểm tra xem chữ trên bảng (đã khử dấu thanh) có nằm trong danh sách đoán không
                        if (guessedChars.includes(normCell)) {
                            const pos = rcToPosition(r, c);
                            if (pos != null) foundPositions.push(pos);
                        }
                    }
                }
            }

            if (foundPositions.length > 0) {
                fillPositionsToController(foundPositions);
            } else {
            }
        }

        function fillPositionsToController(positions) {
            if (positions.length === 0) {
                return;
            }

            // 1. Sắp xếp vị trí từ nhỏ đến lớn
            positions.sort((a, b) => a - b);

            // 2. Cập nhật số lượng ô input
            const numPosInput = document.getElementById('numPos');
            numPosInput.value = positions.length;

            // 3. Kích hoạt hàm tạo ô input (hàm có sẵn trong file của bạn)
            generatePosInputs();

            // 4. Đợi một nhịp nhỏ để DOM cập nhật rồi điền giá trị
            setTimeout(() => {
                const posItems = document.querySelectorAll('.pos-item');
                positions.forEach((p, idx) => {
                    if (posItems[idx]) {
                        posItems[idx].value = p;
                    }
                });
            }, 50);
        }

        function removeVietnameseTones(str) {
            if (!str) return "";
            str = str.toUpperCase().trim();

            // Nhóm A, Ă, Â
            str = str.replace(/[ÁÀẢÃẠ]/g, "A");
            str = str.replace(/[ẮẰẲẴẶ]/g, "Ă");
            str = str.replace(/[ẤẦẨẪẬ]/g, "Â");
            // Nhóm E, Ê
            str = str.replace(/[ÉÈẺẼẸ]/g, "E");
            str = str.replace(/[ẾỀỂỄỆ]/g, "Ê");
            // Nhóm I
            str = str.replace(/[ÍÌỈĨỊ]/g, "I");
            // Nhóm O, Ô, Ơ
            str = str.replace(/[ÓÒỎÕỌ]/g, "O");
            str = str.replace(/[ỐỒỔỖỘ]/g, "Ô");
            str = str.replace(/[ỚỜỞỠỢ]/g, "Ơ");
            // Nhóm U, Ư (Đảm bảo tách biệt tuyệt đối)
            str = str.replace(/[ÚÙỦŨỤ]/g, "U");
            str = str.replace(/[ỨỪỬỮỰ]/g, "Ư");
            // Nhóm Y
            str = str.replace(/[ÝỲỶỸỴ]/g, "Y");
            // Nhóm D, Đ
            str = str.replace(/[Đ]/g, "Đ");

            return str;
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            // Chặn F12
            if (e.keyCode === 123) e.preventDefault();
            // Chặn Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            if ((e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
            }
        });
